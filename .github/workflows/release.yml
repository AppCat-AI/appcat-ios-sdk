name: Release

# Triggered by pushing a tag (e.g. `0.1.0`). Pushes the podspec to the
# CocoaPods trunk so consumers can install via `pod 'AppCat'`. SPM consumers
# resolve directly from the GitHub tag and require no publishing step.
#
# Requires the `COCOAPODS_TRUNK_TOKEN` repository secret (a session token from
# `pod trunk register`).

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  pod-trunk:
    name: Publish podspec to CocoaPods trunk
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          PODSPEC_VERSION="$(grep -E "^\s*s\.version\s*=" AppCat.podspec | head -n 1 | awk -F"'" '{print $2}')"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PODSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "AppCat.podspec version ($PODSPEC_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Lint podspec
        run: pod spec lint AppCat.podspec --allow-warnings

      - name: Push to CocoaPods trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push AppCat.podspec --allow-warnings
